<style>
    .table-no-right-pad :is(th, td) {
        padding-inline-end: 0; /* = padding-right in LTR, padding-left in RTL */
    }
    /* remove top border for the first body row */
    .table-no-right-pad tbody tr:first-child > th,
    .table-no-right-pad tbody tr:first-child > td {
        border-top: 0 !important;
    }

    .review-checkbox-row {
        cursor: pointer;
    }
</style>
<table class="table table-md table-fixed-cols table-no-right-pad" id="review-grading-scheme-checkboxes-dt">
    <colgroup>
        <col style="width:50px;">
        <col style="width:50px;">
        <col>
    </colgroup>
    <tbody>
    {% for gsc in grading_scheme_checkboxes %}
        <tr class="review-checkbox-row"
            onclick="toggleReviewCheckboxFromRow(event, 'check-{{ gsc.ref }}-{{ gsc.item_id }}')">
            <td style="padding-bottom: 0px;">
                <div class="custom-control custom-switch mb-3">
                    <input class="custom-control-input" type="checkbox"
                           id="check-{{ gsc.ref }}-{{ gsc.item_id }}"
                           name="check-{{ gsc.ref }}-{{ gsc.item_id }}"
                           {% if gsc.checked %}checked{% endif %}
                           onchange="updatePagesGroupCheckBox(this.id, this.checked, null,{% if gsc.name == 'ZERO' %} true {% else %} false {% endif %},{% if gsc.name == 'FULL' %} true {% else %} false {% endif %})"/>
                    <label class="custom-control-label" for="check-{{ gsc.ref }}-{{ gsc.item_id }}"></label>
                </div>
            </td>
            {% if gsc.name == 'ADJ' %}
                <td colspan="2" style="padding-bottom: 0px;">
                    <input class="form-control form-control-sm d-inline-block w-auto mr-2" type="number"
                           id="adj-{{ gsc.ref }}-{{ gsc.item_id }}"
                           name="adj-{{ gsc.ref }}-{{ gsc.item_id }}"
                           step="0.01"
                           style="width:100px;"
                           onchange="updatePagesGroupCheckBox(this.id, null, this.value,false,false)"
                           value="{{ gsc.adjustment }}"/> {{ gsc.description }}
                </td>
                </tr>
            {% elif gsc.name == "ZERO" or gsc.name == "FULL" %}
                <td colspan="3" style="padding-bottom: 0px;">
                {{ gsc.description }}
                </td>
                </tr>
            {% else %}
                <td style="padding-bottom: 0px;">
                    {{ gsc.points }}
                </td>
                <td style="padding-right:20px;">
                    {{ gsc.name }}
                </td>
            </tr>
            <tr>
                <td colspan="3"
                    style="border-top:None;padding-top:0px;padding-left:70px;padding-right:20px;"
                    class="review-checkbox-row"
                    onclick="toggleReviewCheckboxFromRow(event, 'check-{{ gsc.ref }}-{{ gsc.item_id }}')">{{ gsc.description|safe }}</td>
            </tr>
            {% endif %}

    {% endfor %}

    </tbody>
</table>
<script>
    window.toggleReviewCheckboxFromRow = window.toggleReviewCheckboxFromRow || function (event, checkboxId) {
        const target = event && event.target instanceof Element ? event.target : null;
        if (target && target.closest('input, label, button, a, textarea, select')) {
            return;
        }

        const checkbox = document.getElementById(checkboxId);
        if (!checkbox || checkbox.disabled) {
            return;
        }

        checkbox.checked = !checkbox.checked;
        checkbox.dispatchEvent(new Event('change', {bubbles: true}));
    };
</script>
<hr/>
<div class="mb-1">
    <label for="student-report-note-{{ grading_scheme.pages_group.id }}" class="form-label mb-1">
        Note for student
    </label>
    <textarea
            id="student-report-note-{{ grading_scheme.pages_group.id }}"
            class="form-control form-control-sm js-student-report-note"
            data-pages-group-id="{{ grading_scheme.pages_group.id }}"
            rows="4"
            placeholder="Visible in AMC annotated PDF when enabling 'Add grading scheme report with annotations'."
            {% if not student_report_note_enabled %}disabled{% endif %}>{{ student_report_note }}</textarea>
</div>
