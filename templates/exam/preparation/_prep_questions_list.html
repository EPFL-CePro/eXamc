{% for question in questions %}
    <div
        id="prep-question-{{ question.id }}"
        hx-get="{% url 'prep_question_panel' exam_selected.pk question.id %}"
        hx-trigger="load"
        hx-target="this"
        hx-swap="outerHTML">
    </div>
{% empty %}
    <div class="text-muted">No questions</div>
{% endfor %}
