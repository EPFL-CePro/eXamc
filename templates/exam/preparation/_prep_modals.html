<div id="exam_preview_dialog" class="modal fade" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Preview PDF</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div id="exam_preview_loading" class="text-center py-4" style="display:none;">
          <div class="spinner-border" role="status"></div>
          <div class="mt-3">Compilation in progress ...</div>
        </div>

        <div id="exam_preview_error" style="display:none;">
          <label for="exam_preview_error_message" class="form-label">Compilation error</label>
          <textarea
            id="exam_preview_error_message"
            class="form-control"
            rows="18"
            readonly
          ></textarea>
        </div>

        <iframe
          id="exam_preview_pdf"
          style="width:100%; height:75vh; border:0; display:none;"
        ></iframe>
      </div>
    </div>
  </div>
</div>

<div id="edit_latex_file_modal" class="modal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-xl" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="edit_latex_file_modal_title"></h5>
        <span id="edit_latex_file_type" hidden></span>
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
            <textarea class="form-control" id="latex_source_text" rows="30"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <a type="button" class="btn btn-dark btn-sm" onclick="saveEditedLaTeXFile();">Save changes</a>
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<div id="edit_latex_packages_modal" class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable" style="height:75vh;">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit LaTeX packages</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">

        <div>
          <label class="form-label fw-semibold">Used packages</label>
          <div id="used_latex_packages_list" class="latex-package-chips"></div>
        </div>
        <hr/>
        <div class="mb-4 position-relative">
          <label for="latex_package_search" class="form-label fw-semibold">Add package</label>
          <input
            type="text"
            id="latex_package_search"
            class="form-control"
            placeholder="Search available packages..."
            autocomplete="off"
          >
          <div id="latex_package_search_results" class="latex-search-results shadow-sm"></div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-primary btn-sm" onclick="saveEditedLaTeXPackages()">
          Save changes
        </button>
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
          Close
        </button>
      </div>
    </div>
  </div>
</div>
